<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Label Tool v3</title>
    <style>
        /* Schermweergave */
        body { font-family: sans-serif; padding: 10px; background: #eee; }
        .box { background: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; }
        input { width: 60%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; }
        .mic { padding: 8px; cursor: pointer; background: #f0f0f0; border: 1px solid #ccc; }
        
        /* De Grote Print Knop */
        #p-btn { 
            position: fixed; bottom: 20px; left: 10%; width: 80%; 
            padding: 20px; background: #28a745; color: white; 
            font-size: 20px; font-weight: bold; border: none; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 999;
        }

        /* Print Instellingen */
        #p-grid { display: none; }
        @media print {
            body * { display: none !important; }
            #p-grid { display: grid !important; grid-template-columns: 105mm 105mm; grid-template-rows: repeat(6, 49mm); width: 210mm; height: 294mm; margin: 0; padding: 0; }
            .l { border: 0.1mm solid #000; padding: 15px; display: flex; flex-direction: column; justify-content: space-between; text-transform: uppercase; box-sizing: border-box; }
            .n { font-size: 20pt; font-weight: bold; text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
            .c { text-align: right; font-weight: bold; font-size: 14pt; }
            
            /* Kleuren dwingen */
            .eb { background: #FFD700 !important; } .v3 { background: #FF8C00 !important; }
            .sr { background: #D32F2F !important; color: white !important; } .vr { background: #EF5350 !important; }
            .st { background: #1976D2 !important; color: white !important; } .tr { background: #388E3C !important; color: white !important; }
            .ac { background: #455A64 !important; color: white !important; } .fi { background: #EC407A !important; color: white !important; }
        }
    </style>
</head>
<body>

    <h3>Vul labels in:</h3>
    <div id="inputs">
        <script>
            const cats = [["eb","E-BIKE"],["v3","V3"],["sr","SCHIJFREM"],["vr","VELGREM"],["st","STUUR"],["tr","TRANS"],["ac","ACC"],["fi","FIT"]];
            for(let i=1; i<=12; i++) {
                const c = cats[(i-1)%8];
                document.write(`
                    <div class="box">
                        <strong>${c[1]} (Label ${i})</strong><br>
                        <input type="text" id="i${i}" placeholder="Naam"> 
                        <button class="mic" onclick="talk('i${i}')">🎤</button><br>
                        <input type="text" id="c${i}" placeholder="Code">
                        <button class="mic" onclick="talk('c${i}')">🔢</button>
                        <input type="hidden" id="k${i}" value="${c[0]}">
                        <input type="hidden" id="t${i}" value="${c[1]}">
                    </div>
                `);
            }
        </script>
    </div>

    <button id="p-btn" onclick="printNu()">PDF MAKEN</button>

    <div id="p-grid">
        </div>

    <script>
        // Spraakfunctie
        function talk(targetId) {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) return alert("Gebruik Chrome op Android");
            const rec = new Speech();
            rec.lang = 'nl-NL';
            rec.onresult = (e) => {
                let txt = e.results[0][0].transcript.toUpperCase();
                if(targetId.startsWith('c')) txt = txt.replace(/STREEPJE/g, '-').replace(/\s/g, '');
                document.getElementById(targetId).value = txt;
            };
            rec.start();
        }

        // Printfunctie
        function printNu() {
            const grid = document.getElementById('p-grid');
            grid.innerHTML = ''; // Maak leeg
            
            for(let i=1; i<=12; i++) {
                const naam = document.getElementById('i'+i).value || "";
                const code = document.getElementById('c'+i).value || "";
                const kleur = document.getElementById('k'+i).value;
                const catNaam = document.getElementById('t'+i).value;

                grid.innerHTML += `
                    <div class="l ${kleur}">
                        <small>${catNaam}</small>
                        <div class="n">${naam}</div>
                        <div class="c">${code}</div>
                    </div>
                `;
            }

            // Start printen
            window.print();
        }
    </script>
</body>
</html>
