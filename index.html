<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKSHOP LABEL MAKER PRO V10</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --blue-dark: #1a1a1a; --accent: #007bff; --green: #28a745; --red: #dc3545; --font-main: 'Inter', sans-serif;
        }

        body { font-family: var(--font-main); margin: 0; background: #f0f2f5; padding-bottom: 140px; color: #000; }
        header { background: var(--blue-dark); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        
        .nav-btns { display: flex; gap: 10px; align-items: center; }
        .info-btn { background: var(--accent); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: 900; font-size: 18px; }

        .container { padding: 15px; max-width: 500px; margin: auto; }
        .input-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 5px solid var(--accent); margin-bottom: 20px; }
        
        label { font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; display: block; color: #666; }
        select, input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-weight: 700; margin-bottom: 12px; font-size: 16px; box-sizing: border-box; }
        
        .input-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .mic-btn { background: #f0f2f5; border: none; border-radius: 12px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; flex-shrink: 0; }
        .mic-btn.listening { background: var(--red); color: white; animation: pulse 1.2s infinite; }
        
        .add-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; text-transform: uppercase; cursor: pointer; }
        
        #infoModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; max-width: 90%; max-height: 80%; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; font-weight: 900; }

        .page-preview { display: grid; gap: 2px; width: 60px; height: 80px; background: #ddd; padding: 4px; border-radius: 4px; }
        .slot { background: #fff; border-radius: 1px; }
        .slot.filled { background: var(--accent); }
        .queue-item { background: #fff; padding: 12px; border-radius: 10px; border-left: 10px solid #ddd; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .queue-item input { margin-bottom: 0; padding: 8px; font-size: 14px; border: none; background: #f9f9f9; width: 100%; }
        .remove-btn { background: #fff1f1; border: none; color: var(--red); width: 32px; height: 32px; border-radius: 50%; font-weight: 700; cursor: pointer; flex-shrink: 0; }
        .btn-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 18px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-weight: 700; font-size: 18px; z-index: 100; width: 85%; max-width: 400px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @media print {
            .container, .btn-print, header, #infoModal { display: none !important; }
            @page { size: A4 portrait; margin: 0 !important; }
            html, body { margin: 0 !important; padding: 0 !important; background: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            #printGrid { display: grid !important; width: 210mm; grid-template-columns: var(--print-cols); grid-template-rows: repeat(auto-fill, var(--print-height)); }
            .label { 
                width: 100%; height: var(--print-height); display: block; position: relative; padding: 25px; 
                box-sizing: border-box; text-transform: uppercase; 
                /* VERBETERDE SNIJLIJNEN: SOLID EN DONKERDER GRIJS */
                border: 1pt solid #888; 
                page-break-inside: avoid; break-inside: avoid; overflow: hidden;
            }
            .itm-cat { font-weight: 700; font-size: 10pt; display: block; margin-bottom: 5px; opacity: 0.8; }
            .itm-n { height: 60%; display: flex; align-items: center; justify-content: center; font-size: var(--font-size-name); font-weight: 900; text-align: center; line-height: 1.1; }
            .itm-c-container { position: absolute; bottom: 25px; right: 25px; }
            .itm-c { background: white !important; color: #000 !important; border: 4px solid #000; padding: 5px 15px; font-size: var(--font-size-code); font-weight: 900; }
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <h1 id="txt-title">Workshop Labels</h1>
    <div class="nav-btns">
        <select id="langSelect" onchange="changeLanguage()" style="width:auto; margin-bottom:0; padding:5px; font-size:12px; background: #333; color: white; border:none; border-radius:5px;">
            <option value="nl">NL</option>
            <option value="fr">FR</option>
            <option value="en">EN</option>
        </select>
        <button class="info-btn" onclick="toggleModal(true)">ⓘ</button>
    </div>
</header>

<div class="container">
    <div class="input-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div style="flex:1; margin-right:10px;">
                <label id="lbl-size">Formaat</label>
                <select id="sizeSelect" onchange="renderVisualPage()">
                    <option value="a5">A5 (2)</option>
                    <option value="a6">A6 (4)</option>
                    <option value="a7" selected>A7 (8)</option>
                    <option value="a7h">A7½ (12)</option>
                    <option value="a8">A8 (16)</option>
                </select>
            </div>
            <div id="visualPage" class="page-preview"></div>
        </div>

        <label id="lbl-cat">Categorie</label>
        <select id="catSelect"></select>
        
        <label id="lbl-name">Productnaam</label>
        <div class="input-wrapper">
            <input type="text" id="prodName" placeholder="..." autocomplete="off">
            <button class="mic-btn" onclick="startSpeech('prodName', 'name')" id="mic-n">🎤</button>
        </div>
        
        <label id="lbl-code">Itemcode</label>
        <div class="input-wrapper">
            <input type="text" id="prodCode" placeholder="..." autocomplete="off">
            <button class="mic-btn" onclick="startSpeech('prodCode', 'code')" id="mic-c">🔢</button>
        </div>

        <label id="lbl-qty">Aantal</label>
        <input type="number" id="prodQty" value="1" min="1" max="16">

        <button class="add-btn" onclick="addToQueue()" id="btn-add">Toevoegen</button>
    </div>

    <div class="queue-header" style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
        <strong id="counter">Labels: 0</strong>
        <button onclick="clearAll()" id="btn-clear" style="color:var(--red); border:none; background:none; font-size:12px; cursor:pointer; font-weight:700; text-transform:uppercase;">Wis alles</button>
    </div>
    <div id="queueList"></div>
</div>

<button class="btn-print" id="btn-print" disabled onclick="doPrint()">Genereer Printvel</button>

<div id="infoModal">
    <div class="modal-content">
        <span class="close-modal" onclick="toggleModal(false)">×</span>
        <h2 id="modal-title">Info</h2>
        <div id="modal-text"></div>
    </div>
</div>

<div id="printGrid"></div>

<script>
    let currentLang = localStorage.getItem('appLang') || 'nl';
    let labelQueue = JSON.parse(localStorage.getItem('labelQueue')) || [];
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    const translations = {
        nl: {
            title: "Atelier Labels", size: "Formaat", cat: "Categorie", name: "Productnaam", code: "Itemcode", 
            qty: "Aantal", add: "Toevoegen", clear: "WIS ALLES", print: "Genereer Printvel", labels: "Wachtrij",
            howTo: "<h3>Spraak</h3>Gebruik de microfoon om namen of codes in te spreken. Zeg 'OK' om direct toe te voegen.<h3>Aantal</h3>Kies hoeveel duplicaten je nodig hebt.<h3>Bewerken</h3>Klik op een label in de lijst om tekst aan te passen.<h3>Layout</h3>De tool past automatisch de tekstgrootte aan. Snijlijnen zijn nu extra duidelijk voor de snijtafel.",
            categories: { pneu: "BANDEN", vae: "E-BIKE ONDERDELEN", frein: "REMSYSTEEM", dir: "STUURINRICHTING", trans: "AANDRIJVING", acc: "ACCESSOIRES", bsr: "KINDERFIETSEN" }
        },
        fr: {
            title: "Étiquettes Atelier", size: "Format", cat: "Catégorie", name: "Nom du Produit", code: "Code Article", 
            qty: "Quantité", add: "Ajouter", clear: "TOUT EFFACER", print: "Imprimer", labels: "File d'attente",
            howTo: "<h3>Vocal</h3>Utilisez le micro pour dicter. Dites 'OK' pour ajouter.<h3>Quantité</h3>Choisissez le nombre de copies.<h3>Modifier</h3>Cliquez sur un élément de la liste pour le modifier.<h3>Format</h3>Lignes de coupe solides pour une découpe facile.",
            categories: { pneu: "PNEUMATIQUES", vae: "PIÈCES VAE", frein: "FREINAGE", dir: "DIRECTION", trans: "TRANSMISSION", acc: "ACCESSOIRES", bsr: "VÉLOS ENFANTS" }
        },
        en: {
            title: "Workshop Labels", size: "Format", cat: "Category", name: "Product Name", code: "Item Code", 
            qty: "Quantity", add: "Add to Queue", clear: "CLEAR ALL", print: "Generate Print Sheet", labels: "Queue",
            howTo: "<h3>Voice</h3>Use the mic to dictate. Say 'OK' to add immediately.<h3>Quantity</h3>Select duplicates.<h3>Editing</h3>Click item in list to edit.<h3>Layout</h3>Solid cut lines added for easier trimming.",
            categories: { pneu: "TYRES", vae: "E-BIKE PARTS", frein: "BRAKING", dir: "STEERING", trans: "DRIVETRAIN", acc: "ACCESSORIES", bsr: "KIDS BIKES" }
        }
    };

    const colors = { pneu:'#E30613', vae:'#FFD400', frein:'#FF8200', dir:'#009FE3', trans:'#93d68f', acc:'#d1d3d4', bsr:'#E4007E' };

    function changeLanguage() {
        currentLang = document.getElementById('langSelect').value;
        localStorage.setItem('appLang', currentLang);
        updateInterface();
    }

    function updateInterface() {
        const t = translations[currentLang];
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('lbl-size').innerText = t.size;
        document.getElementById('lbl-cat').innerText = t.cat;
        document.getElementById('lbl-name').innerText = t.name;
        document.getElementById('lbl-code').innerText = t.code;
        document.getElementById('lbl-qty').innerText = t.qty;
        document.getElementById('btn-add').innerText = t.add;
        document.getElementById('btn-clear').innerText = t.clear;
        document.getElementById('btn-print').innerText = t.print;
        document.getElementById('modal-text').innerHTML = t.howTo;

        const catSelect = document.getElementById('catSelect');
        catSelect.innerHTML = '';
        for (let [key, val] of Object.entries(t.categories)) {
            catSelect.innerHTML += `<option value="${key}">${val}</option>`;
        }
        render();
    }

    function toggleModal(show) { document.getElementById('infoModal').style.display = show ? 'flex' : 'none'; }

    function getContrastYIQ(hex){
        hex = hex.replace("#", "");
        let r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? 'black' : 'white';
    }

    function startSpeech(inputId, type) {
        if (!SpeechRecognition) return alert("Browser error");
        const rec = new SpeechRecognition(); rec.lang = currentLang === 'nl' ? 'nl-NL' : (currentLang === 'fr' ? 'fr-FR' : 'en-US');
        const btn = document.getElementById(type === 'name' ? 'mic-n' : 'mic-c');
        rec.onstart = () => btn.classList.add('listening');
        rec.onresult = (e) => {
            let res = e.results[0][0].transcript.toUpperCase();
            if(res.includes("OK") || res.includes("VOEG TOE")) { addToQueue(); return; }
            document.getElementById(inputId).value = res;
        };
        rec.onend = () => btn.classList.remove('listening');
        rec.start();
    }

    function addToQueue() {
        const nInput = document.getElementById('prodName'), cInput = document.getElementById('prodCode'), qInput = document.getElementById('prodQty'), catSelect = document.getElementById('catSelect');
        if (!nInput.value) return;
        const qty = parseInt(qInput.value) || 1;
        for(let i=0; i<qty; i++) {
            labelQueue.push({ key: catSelect.value, cat: catSelect.options[catSelect.selectedIndex].text, name: nInput.value.toUpperCase(), code: cInput.value.toUpperCase(), color: colors[catSelect.value] });
        }
        nInput.value = ''; cInput.value = ''; qInput.value = '1';
        save(); render(); nInput.focus();
    }

    function render() {
        const list = document.getElementById('queueList');
        document.getElementById('btn-print').disabled = labelQueue.length === 0;
        document.getElementById('counter').innerText = `${translations[currentLang].labels}: ${labelQueue.length}`;
        list.innerHTML = '';
        labelQueue.forEach((item, index) => {
            list.innerHTML += `<div class="queue-item" style="border-left-color: ${item.color}"><div style="flex-grow: 1;"><input type="text" value="${item.name}" onchange="labelQueue[${index}].name=this.value.toUpperCase();save();"><input type="text" value="${item.code}" onchange="labelQueue[${index}].code=this.value.toUpperCase();save();" style="margin-top:4px; font-weight:bold;"></div><button class="remove-btn" onclick="labelQueue.splice(${index},1);save();render();">✕</button></div>`;
        });
        renderVisualPage();
    }

    function save() { localStorage.setItem('labelQueue', JSON.stringify(labelQueue)); }
    function clearAll() { if(confirm("Clear All?")) { labelQueue = []; save(); render(); } }

    function renderVisualPage() {
        const size = document.getElementById('sizeSelect').value, visual = document.getElementById('visualPage'), countMap = { a5:2, a6:4, a7:8, a7h:12, a8:16 };
        visual.innerHTML = '';
        for(let i=0; i<countMap[size]; i++) visual.innerHTML += `<div class="slot ${(i < labelQueue.length % (countMap[size] + 0.1)) && labelQueue.length > 0 ? 'filled' : ''}"></div>`;
    }

    function doPrint() {
        const grid = document.getElementById('printGrid'), size = document.getElementById('sizeSelect').value; grid.innerHTML = '';
        const s = { a5:{c:'210mm',h:'148.5mm',n:'45pt',cc:'30pt'}, a6:{c:'105mm 105mm',h:'148.5mm',n:'35pt',cc:'25pt'}, a7:{c:'105mm 105mm',h:'74.2mm',n:'26pt',cc:'18pt'}, a7h:{c:'70mm 70mm 70mm',h:'74.2mm',n:'20pt',cc:'14pt'}, a8:{c:'52.5mm 52.5mm 52.5mm 52.5mm',h:'74.2mm',n:'16pt',cc:'12pt'} }[size];
        grid.style.setProperty('--print-cols', s.c); grid.style.setProperty('--print-height', s.h); grid.style.setProperty('--font-size-name', s.n); grid.style.setProperty('--font-size-code', s.cc);
        labelQueue.forEach(item => {
            grid.innerHTML += `<div class="label" style="background-color:${item.color} !important; color:${getContrastYIQ(item.color)} !important;"><span class="itm-cat">${item.cat}</span><div class="itm-n">${item.name}</div><div class="itm-c-container"><div class="itm-c">${item.code}</div></div></div>`;
        });
        grid.innerHTML += `<div style="height: 1mm; width: 100%; page-break-after: always;"></div>`;
        setTimeout(() => { window.print(); }, 250);
    }

    document.getElementById('langSelect').value = currentLang;
    updateInterface();
</script>
</body>
</html>
