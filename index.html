<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fietshub Label Tool</title>
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 120px; }
        header { background: var(--blue); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        
        /* Interface Styles */
        .controls { padding: 10px; max-width: 1000px; margin: auto; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
        .row { background: white; padding: 10px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; border: 1px solid #ddd; }
        .row-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        select { padding: 6px; border: 1px solid #ccc; border-radius: 6px; font-weight: bold; width: 140px; }
        .input-wrapper { display: flex; align-items: center; gap: 8px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; flex: 1; outline: none; }
        .mic-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .mic-btn.listening { background: var(--red); color: white; }
        
        .btn-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 18px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 200; width: 85%; max-width: 400px; cursor: pointer; }

        /* PRINT STYLES */
        #printGrid { display: none; }

        @media print {
            header, .controls, .btn-print { display: none !important; }
            @page { size: A4 portrait; margin: 0; }
            html, body { margin: 0; padding: 0; background: white; width: 210mm; height: 297mm; }
            
            #printGrid { 
                display: grid !important; 
                grid-template-columns: 105mm 105mm; 
                grid-template-rows: repeat(6, 48mm); /* 6 x 48mm = 288mm (past op A4 van 297mm) */
                width: 210mm; 
                height: 288mm;
                margin: 0;
                padding: 0;
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .label { 
                width: 105mm; 
                height: 48mm; 
                display: flex; 
                flex-direction: column; 
                justify-content: space-between; 
                padding: 15px; 
                box-sizing: border-box; 
                text-transform: uppercase; 
                border: 0.1px solid #eee;
                break-inside: avoid;
            }
            .itm-n { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 18pt; font-weight: 900; text-align: center; line-height: 1.1; }
            .itm-c { align-self: flex-end; background: white; color: black; padding: 2px 8px; font-size: 11pt; font-weight: bold; border: 1px solid #000; }
        }

        /* Kleur Thema's */
        .c-ebike { background-color: #FFD700 !important; color: #000; }
        .c-v3 { background-color: #FF8C00 !important; color: #fff; }
        .c-schijf { background-color: #D32F2F !important; color: #fff; }
        .c-velg { background-color: #EF5350 !important; color: #fff; }
        .c-stuur { background-color: #1976D2 !important; color: #fff; }
        .c-trans { background-color: #388E3C !important; color: #fff; }
        .c-acc { background-color: #455A64 !important; color: #fff; }
        .c-fit { background-color: #EC407A !important; color: #fff; }
    </style>
</head>
<body>

<header>FIETSHUB LABELS</header>

<div class="controls">
    <div class="input-grid">
        <script>
            const catNames = ["E-BIKE", "E-BIKE V3", "SCHIJFREM", "VELGREM", "STUUR", "TRANSMISSIE", "ACCESSORIES", "FITNESS"];
            const catKeys = ["ebike", "v3", "schijf", "velg", "stuur", "trans", "acc", "fit"];
            for(let i=1; i<=12; i++) {
                const k = catKeys[(i-1) % 8];
                document.write(`
                    <div class="row">
                        <div class="row-header">
                            <select id="sel-${i}">
                                ${catKeys.map((key, idx) => `<option value="${key}" ${key===k?'selected':''}>${catNames[idx]}</option>`).join('')}
                            </select>
                            <span style="font-size: 10px;">L${i}</span>
                        </div>
                        <div class="input-wrapper">
                            <input type="text" id="i-${i}" placeholder="Productnaam">
                            <button class="mic-btn" onclick="startSpeech(${i}, 'name')" id="mic-n-${i}">🎤</button>
                        </div>
                        <div class="input-wrapper">
                            <input type="text" id="c-${i}" style="font-weight:bold;" placeholder="Code">
                            <button class="mic-btn" onclick="startSpeech(${i}, 'code')" id="mic-c-${i}">🔢</button>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>
</div>

<button class="btn-print" id="printBtn">MAAK PDF / PRINT</button>

<div id="printGrid">
    <script>
        for(let i=1; i<=12; i++) {
            document.write(`
                <div class="label" id="label-${i}">
                    <span style="font-weight:bold; font-size:9pt; opacity:0.7;" id="o-cat-${i}"></span>
                    <div class="itm-n" id="o-name-${i}"></div>
                    <div class="itm-c" id="o-code-${i}"></div>
                </div>
            `);
        }
    </script>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function startSpeech(id, targetType) {
        if (!SpeechRecognition) return alert("Chrome gebruiken aub.");
        const rec = new SpeechRecognition();
        rec.lang = 'nl-NL';
        rec.onstart = () => document.getElementById(targetType === 'name' ? 'mic-n-'+id : 'mic-c-'+id).classList.add('listening');
        rec.onresult = (e) => {
            let res = e.results[0][0].transcript;
            if(targetType === 'code') res = res.toLowerCase().replace(/streepje/g, '-').replace(/\s+/g, '').toUpperCase();
            else res = res.toUpperCase();
            document.getElementById(targetType === 'name' ? 'i-'+id : 'c-'+id).value = res;
        };
        rec.onend = () => document.querySelectorAll('.mic-btn').forEach(b => b.classList.remove('listening'));
        rec.start();
    }

    document.getElementById('printBtn').addEventListener('click', function() {
        for(let i=1; i<=12; i++) {
            const sel = document.getElementById('sel-' + i);
            const label = document.getElementById('label-' + i);
            label.className = 'label c-' + sel.value;
            document.getElementById('o-cat-' + i).innerText = sel.options[sel.selectedIndex].text;
            document.getElementById('o-name-' + i).innerText = document.getElementById('i-' + i).value;
            const cVal = document.getElementById('c-' + i).value;
            document.getElementById('o-code-' + i).innerText = cVal;
            document.getElementById('o-code-' + i).style.display = cVal ? 'block' : 'none';
        }
        window.print();
    });
</script>
</body>
</html>
