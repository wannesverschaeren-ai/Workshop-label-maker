<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKSHOP LABEL MAKER</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --blue-dark: #1a1a1a; 
            --accent: #007bff; 
            --green: #28a745; 
            --red: #dc3545; 
            --font-main: 'Inter', -apple-system, sans-serif;
            --text-black: #000000;
        }

        body { font-family: var(--font-main); margin: 0; background: #f0f2f5; padding-bottom: 100px; -webkit-font-smoothing: antialiased; color: var(--text-black); }
        header { background: var(--blue-dark); color: white; padding: 20px; text-align: center; font-weight: 900; letter-spacing: 1px; position: sticky; top: 0; z-index: 100; text-transform: uppercase; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .input-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-top: 5px solid var(--accent); margin-bottom: 25px; color: var(--text-black); }
        select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-weight: 700; margin-bottom: 15px; font-size: 16px; font-family: var(--font-main); color: var(--text-black); }
        .input-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input { padding: 14px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; flex: 1; outline: none; font-family: var(--font-main); color: var(--text-black); }
        input:focus { border-color: var(--accent); }
        .mic-btn { background: #f0f2f5; border: none; border-radius: 12px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; color: var(--text-black); }
        .mic-btn.listening { background: var(--red); color: white; animation: pulse 1.2s infinite; }
        .add-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; text-transform: uppercase; cursor: pointer; }
        
        .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 5px; color: var(--text-black); }
        .queue-item { background: #fff; padding: 12px 15px; border-radius: 10px; border-left: 10px solid #ddd; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); color: var(--text-black); }
        .remove-btn { background: #fff1f1; border: none; color: var(--red); width: 32px; height: 32px; border-radius: 50%; font-weight: 700; cursor: pointer; }
        
        .btn-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 18px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-weight: 700; font-size: 18px; z-index: 100; width: 85%; max-width: 400px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* PRINT LAYOUT */
        #printGrid { display: none; }
        @media print {
            .container, .btn-print, header { display: none !important; }
            @page { size: A4; margin: 0; }
            html, body { margin: 0; padding: 0; background: white !important; font-family: 'Inter', sans-serif; }
            #printGrid { 
                display: grid !important; 
                grid-template-columns: 10.5cm 10.5cm; 
                grid-template-rows: repeat(auto-fill, 7.42cm); 
                width: 21cm; 
            }
            .label { 
                width: 10.5cm; 
                height: 7.42cm; 
                display: flex; 
                flex-direction: column; 
                justify-content: space-between; 
                padding: 40px 30px; 
                box-sizing: border-box; 
                text-transform: uppercase; 
                border: 0.1pt solid #eee; 
                break-inside: avoid;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
                color: #000000 !important; /* Forceer alle tekst op label naar zwart */
            }
            .itm-n { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 30pt; font-weight: 900; text-align: center; line-height: 1.1; letter-spacing: -0.04em; color: #000000 !important; }
            .itm-c { align-self: flex-end; background: white !important; color: #000000 !important; padding: 10px 20px; font-size: 22pt; font-weight: 900; border: 4px solid #000; }
        }

        /* Kleuren per categorie uit segmentatiebestand - Tekst geforceerd op zwart  */
        .c-pneu { background-color: #E30613 !important; color: #000000 !important; }
        .c-vae { background-color: #FFD400 !important; color: #000000 !important; }
        .c-frein { background-color: #FF8200 !important; color: #000000 !important; }
        .c-dir { background-color: #009FE3 !important; color: #000000 !important; }
        .c-trans { background-color: #4DB848 !important; color: #000000 !important; }
        .c-acc { background-color: #63666A !important; color: #000000 !important; }
        .c-bsr { background-color: #E4007E !important; color: #000000 !important; }
    </style>
</head>
<body>

<header>WORKSHOP LABEL MAKER</header>

<div class="container">
    <div class="input-card">
        <h3>Nieuw Label</h3>
        <select id="catSelect">
            <option value="pneu">BANDEN</option>
            <option value="vae">E-BIKE ONDERDELEN</option>
            <option value="frein">REMSYSTEEM</option>
            <option value="dir">STUURINRICHTING</option>
            <option value="trans">AANDRIJVING</option>
            <option value="acc">ACCESSOIRES</option>
            <option value="bsr">KINDERFIETSEN</option>
        </select>
        <div class="input-wrapper">
            <input type="text" id="prodName" placeholder="Productnaam..." autocomplete="off">
            <button class="mic-btn" onclick="startSpeech('prodName', 'name')" id="mic-n">🎤</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="prodCode" placeholder="Itemcode..." autocomplete="off">
            <button class="mic-btn" onclick="startSpeech('prodCode', 'code')" id="mic-c">🔢</button>
        </div>
        <button class="add-btn" onclick="addToQueue()">Toevoegen</button>
    </div>

    <div class="queue-header">
        <strong id="counter">Wachtrij: 0 labels</strong>
        <button onclick="clearAll()" style="color:var(--red); border:none; background:none; font-size:12px; cursor:pointer; font-weight:700;">WIS ALLES</button>
    </div>
    <div id="queueList"></div>
</div>

<button class="btn-print" id="printBtn" disabled onclick="doPrint()">Genereer Printvel</button>
<div id="printGrid"></div>

<script>
    let labelQueue = [];
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    const keywordMap = {
        pneu: ['BAND', 'PNEU', 'TUBE', 'VELG', 'BINNENBAND', 'BUITENBAND'],
        vae: ['ACCU', 'MOTOR', 'DISPLAY', 'SENSOR', 'E-BIKE', 'BATTER'],
        frein: ['REMPAD', 'SCHIJF', 'REMVLOEISTOF', 'BRAKE', 'PATIN', 'REMH'],
        dir: ['VORK', 'STUUR', 'PEN', 'BALHOOFD', 'FOURCHE'],
        trans: ['KETTING', 'CASSETTE', 'TRAPAS', 'PEDAAL', 'DERAILLEUR', 'TAND'],
        bsr: ['KIND', 'MEISJE', 'JONGEN', 'LOOPFIETS']
    };

    function autoSelectCategory(text) {
        for (const [cat, keywords] of Object.entries(keywordMap)) {
            if (keywords.some(kw => text.includes(kw))) {
                document.getElementById('catSelect').value = cat;
                break;
            }
        }
    }

    function wordToNum(text) {
        const map = {'nul':0,'één':1,'een':1,'twee':2,'drie':3,'vier':4,'vijf':5,'zes':6,'zeven':7,'acht':8,'negen':9,'tien':10};
        return text.split(' ').map(word => map[word.toLowerCase()] ?? word).join('');
    }

    function startSpeech(inputId, type) {
        if (!SpeechRecognition) return alert("Gebruik Chrome op Android");
        const rec = new SpeechRecognition();
        rec.lang = 'nl-NL';
        const btn = document.getElementById(type === 'name' ? 'mic-n' : 'mic-c');
        
        rec.onstart = () => btn.classList.add('listening');
        rec.onresult = (e) => {
            let res = e.results[0][0].transcript.toUpperCase();
            if(type === 'name') autoSelectCategory(res);
            if(type === 'code') res = wordToNum(res).replace(/STREEPJE/g, '-').replace(/\s+/g, '');
            document.getElementById(inputId).value = res;
        };
        rec.onend = () => btn.classList.remove('listening');
        rec.start();
    }

    function addToQueue() {
        const nameInput = document.getElementById('prodName');
        const codeInput = document.getElementById('prodCode');
        const catSelect = document.getElementById('catSelect');
        if (!nameInput.value) return;

        labelQueue.push({
            key: catSelect.value,
            cat: catSelect.options[catSelect.selectedIndex].text,
            name: nameInput.value,
            code: codeInput.value
        });

        nameInput.value = '';
        codeInput.value = '';
        render();
    }

    function render() {
        const list = document.getElementById('queueList');
        document.getElementById('printBtn').disabled = labelQueue.length === 0;
        document.getElementById('counter').innerText = `Wachtrij: ${labelQueue.length} labels`;
        list.innerHTML = '';
        labelQueue.forEach((item, index) => {
            list.innerHTML += `<div class="queue-item" style="border-left-color: ${getHex(item.key)}">
                <span><strong>${item.name}</strong> <small>(${item.cat})</small></span>
                <button class="remove-btn" onclick="labelQueue.splice(${index},1);render();">✕</button>
            </div>`;
        });
    }

    function getHex(key) {
        const colors = {pneu:'#E30613', vae:'#FFD400', frein:'#FF8200', dir:'#009FE3', trans:'#4DB848', acc:'#63666A', bsr:'#E4007E'};
        return colors[key];
    }

    function clearAll() { if(confirm("Wachtrij leegmaken?")) { labelQueue = []; render(); } }

    function doPrint() {
        const grid = document.getElementById('printGrid');
        grid.innerHTML = '';
        labelQueue.forEach(item => {
            grid.innerHTML += `<div class="label c-${item.key}"><span style="font-weight:700; font-size:14pt; opacity:1;">${item.cat}</span><div class="itm-n">${item.name}</div><div class="itm-c" style="${item.code ? '' : 'display:none'}">${item.code}</div></div>`;
        });
        setTimeout(() => { window.print(); }, 250);
    }
</script>
</body>
</html>
