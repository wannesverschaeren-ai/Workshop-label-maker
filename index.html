<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORKSHOP LABEL MAKER</title>
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --gray: #6c757d; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 100px; }
        header { background: var(--blue); color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        /* Het Invoerblok */
        .input-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px solid var(--blue); margin-bottom: 20px; }
        .input-card h3 { margin-top: 0; font-size: 14px; color: var(--blue); text-transform: uppercase; }
        
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-weight: bold; margin-bottom: 15px; font-size: 16px; background: #f9f9f9; }
        
        .input-wrapper { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        input { padding: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; flex: 1; outline: none; }
        input:focus { border-color: var(--blue); }
        
        .mic-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; flex-shrink: 0; }
        .mic-btn.listening { background: var(--red); color: white; animation: pulse 1.2s infinite; }
        
        .add-btn { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Wachtrij overzicht */
        .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .queue-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .queue-item { background: #fff; padding: 8px 12px; border-radius: 20px; border: 1px solid #ddd; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .queue-item button { background: none; border: none; color: var(--red); font-weight: bold; cursor: pointer; }

        .btn-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 18px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 100; width: 85%; max-width: 400px; }
        .btn-print:disabled { background: var(--gray); opacity: 0.5; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* PRINT LAYOUT - A7 Formaat (8 labels op A4) */
        #printGrid { display: none; }
        @media print {
            .container, .btn-print, header { display: none !important; }
            @page { size: A4; margin: 0; }
            html, body { margin: 0; padding: 0; background: white; }
            #printGrid { 
                display: grid !important; 
                grid-template-columns: 10.5cm 10.5cm; 
                grid-template-rows: repeat(4, 7.42cm); /* A7 hoogte is exact 7.42cm */
                width: 21cm; 
                height: 29.7cm;
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .label { 
                width: 10.5cm; 
                height: 7.42cm; 
                display: flex; 
                flex-direction: column; 
                justify-content: space-between; 
                padding: 30px; 
                box-sizing: border-box; 
                text-transform: uppercase; 
                border: 0.1pt solid #ddd;
                break-inside: avoid;
            }
            .itm-n { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 28pt; font-weight: 900; text-align: center; }
            .itm-c { align-self: flex-end; background: white; color: black; padding: 5px 15px; font-size: 16pt; font-weight: bold; border: 2px solid #000; }
        }

        /* Categorie kleuren */
        .c-ebike { background: #FFD700 !important; color: #000; }
        .c-v3 { background: #FF8C00 !important; color: #fff; }
        .c-schijf { background: #D32F2F !important; color: #fff; }
        .c-velg { background: #EF5350 !important; color: #fff; }
        .c-stuur { background: #1976D2 !important; color: #fff; }
        .c-trans { background: #388E3C !important; color: #fff; }
        .c-acc { background: #455A64 !important; color: #fff; }
        .c-fit { background: #EC407A !important; color: #fff; }
    </style>
</head>
<body>

<header>FIETSHUB A7 SCANNER</header>

<div class="container">
    <div class="input-card">
        <h3>Nieuw Label</h3>
        <select id="catSelect">
            <option value="ebike">E-BIKE</option>
            <option value="v3">E-BIKE V3</option>
            <option value="schijf">SCHIJFREM</option>
            <option value="velg">VELGREM</option>
            <option value="stuur">STUUR</option>
            <option value="trans">TRANSMISSIE</option>
            <option value="acc">ACCESSORIES</option>
            <option value="fit">FITNESS</option>
        </select>

        <div class="input-wrapper">
            <input type="text" id="prodName" placeholder="Naam (🎤)">
            <button class="mic-btn" onclick="startSpeech('prodName', 'name')" id="mic-n">🎤</button>
        </div>

        <div class="input-wrapper">
            <input type="text" id="prodCode" placeholder="Code (🔢)">
            <button class="mic-btn" onclick="startSpeech('prodCode', 'code')" id="mic-c">🔢</button>
        </div>

        <button class="add-btn" onclick="addToQueue()">TOEVOEGEN AAN LIJST</button>
    </div>

    <div class="queue-header">
        <strong id="counter">Wachtrij: 0 / 8</strong>
        <button onclick="clearAll()" style="color:var(--red); border:none; background:none; font-size:12px; cursor:pointer;">Wis alles</button>
    </div>
    <div class="queue-list" id="queueList"></div>
</div>

<button class="btn-print" id="printBtn" disabled onclick="doPrint()">PDF GENEREREN</button>

<div id="printGrid"></div>

<script>
    let labelQueue = [];
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function startSpeech(inputId, type) {
        if (!SpeechRecognition) return alert("Chrome aub");
        const rec = new SpeechRecognition();
        rec.lang = 'nl-NL';
        const btn = type === 'name' ? document.getElementById('mic-n') : document.getElementById('mic-c');
        
        rec.onstart = () => btn.classList.add('listening');
        rec.onresult = (e) => {
            let res = e.results[0][0].transcript;
            if(type === 'code') res = res.toLowerCase().replace(/streepje/g, '-').replace(/\s+/g, '').toUpperCase();
            else res = res.toUpperCase();
            document.getElementById(inputId).value = res;
        };
        rec.onend = () => btn.classList.remove('listening');
        rec.start();
    }

    function addToQueue() {
        if (labelQueue.length >= 8) return alert("Maximaal 8 labels per pagina!");
        
        const cat = document.getElementById('catSelect');
        const name = document.getElementById('prodName').value;
        const code = document.getElementById('prodCode').value;

        if (!name) return alert("Vul een naam in");

        labelQueue.push({
            catKey: cat.value,
            catName: cat.options[cat.selectedIndex].text,
            name: name,
            code: code
        });

        // Reset inputs
        document.getElementById('prodName').value = '';
        document.getElementById('prodCode').value = '';
        renderQueue();
    }

    function renderQueue() {
        const list = document.getElementById('queueList');
        const btn = document.getElementById('printBtn');
        const counter = document.getElementById('counter');
        
        list.innerHTML = '';
        labelQueue.forEach((item, index) => {
            list.innerHTML += `
                <div class="queue-item">
                    ${item.name} (${item.catName}) 
                    <button onclick="removeItem(${index})">✕</button>
                </div>
            `;
        });

        counter.innerText = `Wachtrij: ${labelQueue.length} / 8`;
        btn.disabled = labelQueue.length === 0;
    }

    function removeItem(index) {
        labelQueue.splice(index, 1);
        renderQueue();
    }

    function clearAll() {
        if(confirm("Hele lijst wissen?")) {
            labelQueue = [];
            renderQueue();
        }
    }

    function doPrint() {
        const grid = document.getElementById('printGrid');
        grid.innerHTML = '';

        labelQueue.forEach(item => {
            grid.innerHTML += `
                <div class="label c-${item.catKey}">
                    <span style="font-weight:bold; font-size:14pt; opacity:0.8;">${item.catName}</span>
                    <div class="itm-n">${item.name}</div>
                    <div class="itm-c" style="${item.code ? '' : 'display:none'}">${item.code}</div>
                </div>
            `;
        });

        setTimeout(() => { window.print(); }, 200);
    }
</script>
</body>
</html>
