<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fietshub Voice Labels</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 100px; }
        header { background: var(--blue); color: white; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .controls { padding: 15px; max-width: 800px; margin: auto; }
        .input-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        
        .row { background: white; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #ddd; position: relative; }
        .row-header { display: flex; justify-content: space-between; align-items: center; }
        
        select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-weight: bold; width: 140px; background: #f8f8f8; }
        .inputs-flex { display: flex; gap: 8px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; flex: 1; min-width: 0; }
        .code-in { max-width: 100px; font-weight: bold; }

        /* Voice Button */
        .mic-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 20px; }
        .mic-btn.listening { background: var(--red); color: white; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 18px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 100; width: 85%; }

        /* Print Layout (Gelijk aan voorheen) */
        @media print {
            .controls, .btn-print, header { display: none !important; }
            @page { size: A4; margin: 0; }
            .grid { display: grid !important; grid-template-columns: 10cm 10cm; grid-template-rows: repeat(4, 6cm); width: 20cm; margin: 0 auto; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .label { width: 10cm; height: 6cm; display: flex; flex-direction: column; justify-content: space-between; padding: 25px; box-sizing: border-box; text-transform: uppercase; border: 0.1pt solid #eee; }
            .itm-n { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 26pt; font-weight: 900; text-align: center; }
            .itm-c { align-self: flex-end; background: white; color: black; padding: 6px 12px; font-size: 14pt; font-weight: bold; border: 1px solid #000; }
        }
        .grid { display: none; }
        /* Categorie kleuren */
        .c-ebike { background-color: #FFD700 !important; color: #000; }
        .c-v3 { background-color: #FF8C00 !important; color: #fff; }
        .c-schijf { background-color: #D32F2F !important; color: #fff; }
        .c-velg { background-color: #EF5350 !important; color: #fff; }
        .c-stuur { background-color: #1976D2 !important; color: #fff; }
        .c-trans { background-color: #388E3C !important; color: #fff; }
        .c-acc { background-color: #455A64 !important; color: #fff; }
        .c-fit { background-color: #EC407A !important; color: #fff; }
    </style>
</head>
<body>

<header>FIETSHUB VOICE LABELS</header>

<div class="controls">
    <div class="input-grid">
        <script>
            const catList = {
                "ebike": "E-BIKE", "v3": "E-BIKE V3", "schijf": "SCHIJFREM", 
                "velg": "VELGREM", "stuur": "STUUR", "trans": "TRANSMISSIE", 
                "acc": "ACCESSORIES", "fit": "FITNESS"
            };
            const keys = Object.keys(catList);
            for(let i=1; i<=8; i++) {
                document.write(`
                    <div class="row" id="row-${i}">
                        <div class="row-header">
                            <select id="sel-${i}">
                                ${Object.entries(catList).map(([k,v]) => `<option value="${k}" ${k===keys[i-1]?'selected':''}>${v}</option>`).join('')}
                            </select>
                            <button class="mic-btn" onclick="startVoice(${i})" id="mic-${i}">🎤</button>
                        </div>
                        <div class="inputs-flex">
                            <input type="text" id="i-${i}" placeholder="Zeg productnaam...">
                            <input type="text" id="c-${i}" class="code-in" placeholder="Code">
                        </div>
                    </div>
                `);
            }
        </script>
    </div>
</div>

<button class="btn-print" onclick="doPrint()">PDF GENEREREN</button>

<div class="grid" id="printGrid">
    <script>
        for(let i=1; i<=8; i++) {
            document.write(`
                <div class="label" id="label-${i}">
                    <span style="font-weight:bold; font-size:12pt; opacity:0.8;" id="o-cat-${i}"></span>
                    <div class="itm-n" id="o-name-${i}"></div>
                    <div class="itm-c" id="o-code-${i}"></div>
                </div>
            `);
        }
    </script>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    function startVoice(id) {
        if (!SpeechRecognition) {
            alert("Spraakherkenning wordt niet ondersteund door deze browser. Gebruik Chrome op Android.");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'nl-NL';
        const micBtn = document.getElementById('mic-' + id);
        
        recognition.onstart = () => {
            micBtn.classList.add('listening');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            console.log("Gehoord:", transcript);
            
            // Logica om te splitsen als de technieker "Naam [pauze] Code" zegt
            // Of we vullen gewoon de naam in.
            document.getElementById('i-' + id).value = transcript.toUpperCase();
            micBtn.classList.remove('listening');
        };

        recognition.onerror = () => {
            micBtn.classList.remove('listening');
            alert("Kon spraak niet horen. Probeer opnieuw.");
        };

        recognition.onend = () => {
            micBtn.classList.remove('listening');
        };

        recognition.start();
    }

    function doPrint() {
        for(let i=1; i<=8; i++) {
            const sel = document.getElementById('sel-' + i);
            const label = document.getElementById('label-' + i);
            label.className = 'label c-' + sel.value;
            document.getElementById('o-cat-' + i).innerText = sel.options[sel.selectedIndex].text;
            document.getElementById('o-name-' + i).innerText = document.getElementById('i-' + i).value || "";
            const cVal = document.getElementById('c-' + i).value;
            document.getElementById('o-code-' + i).innerText = cVal || "";
            document.getElementById('o-code-' + i).style.display = cVal ? 'block' : 'none';
        }
        window.print();
    }
</script>
</body>
</html>
