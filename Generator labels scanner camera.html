<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fietshub Scanner App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#007bff">

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root { --blue: #007bff; --green: #28a745; }
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; }
        
        /* Camera View */
        .v-container { position: sticky; top: 0; width: 100%; height: 200px; background: #000; overflow: hidden; z-index: 10; border-bottom: 3px solid var(--blue); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 98px; border: 2.5px solid var(--blue); border-radius: 5px; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); pointer-events: none; }
        
        #status { text-align: center; font-weight: bold; font-size: 13px; color: var(--blue); padding: 10px; background: white; margin: 0; }

        /* Input Matrix */
        .controls { padding: 10px; max-width: 900px; margin: auto; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 10px; }
        .row { background: white; padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 6px; border: 2px solid #ddd; cursor: pointer; transition: 0.2s; }
        .active-row { border-color: var(--blue); background: #eef6ff; box-shadow: 0 0 10px rgba(0,123,255,0.15); }
        
        select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 11px; font-weight: bold; width: 115px; background: #f8f8f8; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; flex: 1; min-width: 0; }
        .code-in { max-width: 80px; font-weight: bold; color: #333; }

        .btn-print { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 18px 40px; background: var(--green); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 100; width: 80%; max-width: 300px; cursor: pointer; }

        /* Kleur Thema's */
        .c-ebike { --c: #FFD700; --tc: #000; }
        .c-v3    { --c: #FF8C00; --tc: #fff; }
        .c-schijf { --c: #D32F2F; --tc: #fff; }
        .c-velg   { --c: #EF5350; --tc: #fff; }
        .c-stuur  { --c: #1976D2; --tc: #fff; }
        .c-trans  { --c: #388E3C; --tc: #fff; }
        .c-acc    { --c: #455A64; --tc: #fff; }
        .c-fit    { --c: #EC407A; --tc: #fff; }

        @media print { 
            .v-container, .controls, .btn-print, #status { display: none !important; }
            @page { size: A4; margin: 0; }
            .grid { display: grid !important; grid-template-columns: 10cm 10cm; grid-template-rows: repeat(4, 6cm); width: 20cm; margin: 0 auto; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .label { width: 10cm; height: 6cm; border: 0.1pt solid #eee; display: flex; flex-direction: column; justify-content: space-between; padding: 22px; box-sizing: border-box; text-transform: uppercase; background-color: var(--c) !important; color: var(--tc) !important; }
            .cat-n { font-size: 12pt; font-weight: bold; opacity: 0.8; }
            .itm-n { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 24pt; font-weight: 900; text-align: center; }
            .itm-c { align-self: flex-end; background: white; color: black; padding: 6px 12px; font-size: 14pt; font-weight: bold; border: 1px solid #000; }
        }
        .grid { display: none; }
    </style>
</head>
<body>

<div class="v-container">
    <video id="video" autoplay playsinline></video>
    <div class="overlay"></div>
</div>
<p id="status">Laden...</p>

<div class="controls">
    <div class="input-grid" id="mainGrid">
        <script>
            const catList = {
                "ebike": "E-BIKE", "v3": "E-BIKE V3", "schijf": "SCHIJFREM", 
                "velg": "VELGREM", "stuur": "STUUR", "trans": "TRANSMISSIE", 
                "acc": "ACCESSORIES", "fit": "FITNESS"
            };
            const defaultKeys = Object.keys(catList);
            for(let i=1; i<=8; i++) {
                document.write(`
                    <div class="row ${i===1?'active-row':''}" id="row-${i}" onclick="setTarget(${i})">
                        <select id="sel-${i}">
                            ${Object.entries(catList).map(([k,v]) => `<option value="${k}" ${k===defaultKeys[i-1]?'selected':''}>${v}</option>`).join('')}
                        </select>
                        <input type="text" id="i-${i}" placeholder="Product...">
                        <input type="text" id="c-${i}" class="code-in" placeholder="Code">
                    </div>
                `);
            }
        </script>
    </div>
</div>

<button class="btn-print" onclick="doPrint()">PDF GENEREREN</button>

<div class="grid" id="printGrid">
    <script>
        for(let i=1; i<=8; i++) {
            document.write(`
                <div class="label" id="label-${i}">
                    <span class="cat-n" id="o-cat-${i}"></span>
                    <div class="itm-n" id="o-name-${i}"></div>
                    <div class="itm-c" id="o-code-${i}"></div>
                </div>
            `);
        }
    </script>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    let activeIdx = 1;
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let isBusy = false;

    // Service Worker registratie voor PWA (app)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    function setTarget(idx) {
        activeIdx = idx;
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active-row'));
        document.getElementById('row-' + idx).classList.add('active-row');
        status.innerText = "Focus op rij " + idx;
    }

    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            const worker = await Tesseract.createWorker('nld');
            status.innerText = "Scanner Klaar";

            setInterval(async () => {
                if (isBusy) return;
                isBusy = true;
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const { data: { text } } = await worker.recognize(canvas);
                
                const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 3);
                if (lines.length > 0) {
                    const name = lines.find(l => l.match(/CHARGER|36V|SPEED|BATTER|BRAKE|STUUR/i));
                    const code = text.match(/\b\d{7}\b/);
                    if (name) document.getElementById('i-' + activeIdx).value = name;
                    if (code) document.getElementById('c-' + activeIdx).value = code[0];
                }
                isBusy = false;
            }, 1300);
        } catch (e) { status.innerText = "Fout: Gebruik HTTPS link"; }
    }
    startApp();

    function doPrint() {
        for(let i=1; i<=8; i++) {
            const sel = document.getElementById('sel-' + i);
            const label = document.getElementById('label-' + i);
            label.className = 'label c-' + sel.value;
            document.getElementById('o-cat-' + i).innerText = sel.options[sel.selectedIndex].text;
            document.getElementById('o-name-' + i).innerText = document.getElementById('i-' + i).value || "";
            const cVal = document.getElementById('c-' + i).value;
            document.getElementById('o-code-' + i).innerText = cVal || "";
            document.getElementById('o-code-' + i).style.display = cVal ? 'block' : 'none';
        }
        window.print();
    }
</script>
</body>
</html>
